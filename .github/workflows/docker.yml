  #         tags: ghcr.io/skerkour/go-benchmarks:latest


  benchmarks:
    runs-on:  ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        image:
          - ubuntu-24.04-arm
          - ubuntu-24.04

    steps:
      - uses: actions/checkout@v6

      - name: Run Benchmarks
        env:
          GOAMD64: v3
        run: make run
