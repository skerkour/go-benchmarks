name: Docker

# This workflow build and publish the docker image

on:
  push:
    branches:
      - main

env:
  DOCKER_IMAGE: "ghcr.io/skerkour/go-benchmarks"


jobs:
  docker_build:
    # Builds are ran on the default runners for x64 and on 'sepcialized' runners for arm64.
    # https://docs.github.com/en/actions/writing-workflows/choosing-what-your-workflow-does/expressions
    runs-on:  ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-24.04' }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - amd64
          - arm64

    steps:
      - uses: actions/checkout@v6

      # - name: Update packages
      #   run: |
      #     sudo apt update && sudo apt upgrade -y

      - name: Docker build image
        run: |
          make docker_build
          docker image tag ${{ env.DOCKER_IMAGE }}:latest ${{ env.DOCKER_IMAGE }}:latest-${{ matrix.arch }}

      - name: Docker images info
        run: |
          docker images

      - name: Login to container registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin

      - name: Docker push image
        run: |
          docker push ${{ env.DOCKER_IMAGE }}:latest-${{ matrix.arch }}


  docker_push_manifest:
    runs-on: ubuntu-24.04
    needs:
      - docker_build
    steps:
      - name: Login to container registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u $ --password-stdin


      - name: Push Docker manifest
        run: |
          docker manifest create ${{ env.DOCKER_IMAGE }}:latest \
            --amend ${{ env.DOCKER_IMAGE }}:latest-amd64 \
            --amend ${{ env.DOCKER_IMAGE }}:latest-arm64
          docker manifest push ${{ env.DOCKER_IMAGE }}:latest

  # build_and_release:
  #   runs-on: ubuntu-latest

  #   steps:
  #     - uses: actions/checkout@v3

  #     # - name: Build and tag Docker image
  #     #   run: make docker_build

  #     # - name: Docker image info
  #     #   run: docker images

  #     - name: Login to container registries
  #       run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u skerkour --password-stdin

  #     # - name: Push Docker images
  #     #   # see here for the details of the release phase https://devcenter.heroku.com/articles/container-registry-and-runtime#release-phase
  #     #   run: make docker_push

  #     - name: Set up QEMU
  #       uses: docker/setup-qemu-action@v2
  #       with:
  #         platforms: 'arm64'

  #     - name: Set up Docker Buildx
  #       uses: docker/setup-buildx-action@v2

  #     - name: Build and push
  #       uses: docker/build-push-action@v4
